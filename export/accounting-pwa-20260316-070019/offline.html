<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل - نظام المحاسبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Amiri', serif; }
        body {
            background: linear-gradient(135deg, #0f4c75 0%, #3282b8 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }
        .container {
            padding: 2rem;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 2rem; }
        button {
            background: white;
            color: #0f4c75;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s;
            font-family: 'Amiri', serif;
        }
        button:hover { transform: translateY(-2px); }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>أنت غير متصل بالإنترنت</h1>
        <p>يبدو أنك فقدت الاتصال بالشبكة. بعض البيانات قد تكون متاحة في وضع عدم الاتصال.</p>
        <button onclick="window.location.reload()">إعادة المحاولة</button>
    </div>
    <script>
        // التحقق من عودة الاتصال تلقائياً
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
