<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>لوحة التحكم</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#2d6a4f">
</head>
<body>
  <header>
    <div class="brand">
      <img src="../assets/logo.png" alt="الشعار">
      <div>
        <h1>لوحة التحكم</h1>
        <div data-user>جاري تحميل المستخدم...</div>
      </div>
    </div>
  </header>
  <main>
    <nav data-nav></nav>
    <section class="content">
      <div class="notice" data-toast>أهلاً بك، يتم تحديث البيانات الآن.</div>
      <div class="cards">
        <div class="card">
          <h3>إجمالي الأرصدة</h3>
          <div id="total-balances">-</div>
        </div>
        <div class="card">
          <h3>عدد الحسابات</h3>
          <div id="account-count">-</div>
        </div>
        <div class="card">
          <h3>العمليات هذا الشهر</h3>
          <div id="month-transactions">-</div>
        </div>
      </div>
      <h3>مخطط الإيرادات والمصروفات</h3>
      <canvas class="chart" id="income-chart"></canvas>
      <h3>آخر العمليات</h3>
      <div id="latest-transactions"></div>
    </section>
  </main>
  <div class="footer">لوحة تحكم سريعة مع تحليلات فورية.</div>

  <script type="module">
    import '../app.js';
    import { fetchTransactions } from '../modules/transactions.js';
    import { buildDashboardSummary, buildProfitLoss } from '../modules/reports.js';
    import { formatMoney, buildTable, drawBarChart } from '../modules/ui.js';

    const load = async () => {
      const summary = await buildDashboardSummary();
      document.getElementById('total-balances').textContent = formatMoney(summary.total, 'USD');
      document.getElementById('account-count').textContent = summary.accounts.length;

      const transactions = await fetchTransactions();
      const month = new Date().getMonth();
      const thisMonth = transactions.filter(t => new Date(t.date).getMonth() === month);
      document.getElementById('month-transactions').textContent = thisMonth.length;

      const latest = transactions.slice(0, 6).map(tx => [
        tx.date,
        tx.description,
        tx.amount,
        tx.currency
      ]);
      document.getElementById('latest-transactions').innerHTML = buildTable(
        ['التاريخ', 'الوصف', 'المبلغ', 'العملة'],
        latest
      );

      const pl = await buildProfitLoss();
      drawBarChart(
        document.getElementById('income-chart'),
        ['إيرادات', 'مصروفات', 'صافي'],
        [pl.revenue, pl.expenses, pl.net]
      );
    };

    load();
  </script>
</body>
</html>
